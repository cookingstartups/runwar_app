name: runwar_app
description: RunWar — territory running game. Invitation only.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # Fonts
  google_fonts: ^6.2.1

  # State
  flutter_riverpod: ^2.5.1

  # Share referral link
  share_plus: ^12.0.2

  # Phone number input with country code
  intl_phone_field: ^3.2.0

  # — PoC foundation (Spec 1) —

  # Map rendering (declared now; tiles rendered in sibling spec)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # GPS (declared now; tracking in sibling spec)
  geolocator: ^11.0.0

  # Background-location elevation, settings deep link, unified status polling
  # for the permission priming flow (see design.md Package Decision).
  permission_handler: ^11.3.1

  # Gyroscope / accelerometer (anti-cheat orientation sampling)
  sensors_plus: ^4.0.2

  # Local notifications (declared now; payloads in sibling spec)
  flutter_local_notifications: ^17.1.2

  # Timezone support for scheduled notifications
  timezone: ^0.9.4

  # Network connectivity
  connectivity_plus: ^6.0.3

  # Supabase
  supabase_flutter: ^2.5.0

  # Firebase — push notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Device UUID for anonymous auth
  uuid: ^4.4.0

  # Google Sign-In (native, not OAuth redirect)
  google_sign_in: ^6.2.1

  # One-time showcase state
  shared_preferences: ^2.3.2

  # Cryptographic hashing for deterministic slate generation
  crypto: ^3.0.3

  # Date formatting for slate derivation (YYYY-MM-DD)
  intl: ^0.19.0

  # Foreground service — keeps GPS alive when screen locks (MIUI/Android)
  flutter_foreground_task: ^8.0.0

  # App version + device info (used by ErrorLogService for client error logging)
  package_info_plus: ^8.0.0
  device_info_plus: ^11.0.0

  # Local SQLite database for outbox queue and run scratch persistence
  sqflite: ^2.3.0
  path: ^1.9.0

  # Map tile disk cache (Apache 2.0)
  flutter_cache_manager: ^3.4.1

  # Cached network image provider (MIT)
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  mocktail: ^1.0.0
  fake_async: ^1.3.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#08060F"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/cities/
    - assets/hero_photos/
    - assets/intro_tiles/15/16348/
    - assets/intro_tiles/15/16349/
    - assets/intro_tiles/15/16350/
    - assets/intro_tiles/15/16351/
    - assets/intro_tiles/15/16352/
    - assets/intro_tiles/16/32697/
    - assets/intro_tiles/16/32698/
    - assets/intro_tiles/16/32699/
    - assets/intro_tiles/16/32700/
    - assets/intro_tiles/16/32701/
    - assets/intro_tiles/16/32702/
    - assets/intro_tiles/16/32703/
    - assets/intro_tiles/16/32704/
    - assets/intro_tiles/16/32705/
